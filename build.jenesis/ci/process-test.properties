# Selected by -Djenesis.project.properties=ci (the CI full-suite runs): prepends the bare
# flag below to the forked test JVM, where Requirement.requireOrSkip turns an unmet
# tool/network gate into a test FAILURE instead of a silent self-skip - CI installs every
# tool the selected suites need, so a skip there is a broken lane hiding as green.
# Jenesis 0.9.4+ names the test fork's process override "test"; <= 0.9.3 named it "java"
-Djenesis.test.required
