<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>jenesis-repository</title>
    <link rel="stylesheet" th:href="@{/css/pico.min.css}">
    <script th:src="@{/js/htmx.min.js}" defer></script>
</head>
<body>
<header class="container">
    <nav>
        <ul>
            <li><strong>jenesis-repository</strong></li>
        </ul>
        <ul>
            <li th:each="panel : ${panels}">
                <a th:href="'#' + ${panel.id}" th:text="${panel.title}">Panel</a>
            </li>
            <li>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0">
                    <button type="submit" class="secondary outline">Sign out</button>
                </form>
            </li>
        </ul>
    </nav>
</header>
<main class="container">
    <p th:if="${panels.isEmpty()}">No panels are registered.</p>
    <article th:each="panel : ${panels}" th:id="${panel.id}">
        <header><h2 th:text="${panel.title}">Panel</h2></header>
        <div th:utext="${panel.body}">panel body</div>
    </article>
</main>
</body>
</html>
