<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Sign in')}">
    <meta charset="utf-8">
    <title>Sign in &mdash; jenesis-repository</title>
</head>
<body>
<main id="main" class="container">
    <article class="app-card" style="max-width:28rem;margin:4rem auto">
        <header><h1>jenesis-repository</h1></header>
        <p th:if="${param.logout}">You have signed out.</p>

        <div th:if="${oauthConfigured}">
            <p>Sign in to continue.</p>
            <a th:each="registration : ${registrations}" role="button" class="contrast"
               th:href="@{'/oauth2/authorization/' + ${registration.id}}"
               th:text="${registration.name}"
               style="display:block;margin-bottom:.5rem">Sign in</a>
        </div>

        <form th:unless="${oauthConfigured}" th:action="@{/login}" method="post">
            <p>Sign in with a local account.</p>
            <th:block th:if="${param.error}">
                <p th:replace="~{base :: alert('Invalid credentials.', 'danger')}"></p>
            </th:block>
            <label for="username" class="app-sr-only">Username</label>
            <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" required>
            <label for="password" class="app-sr-only">Password</label>
            <input type="password" id="password" name="password" placeholder="Password"
                   autocomplete="current-password" required>
            <button type="submit">Sign in</button>
        </form>
    </article>
</main>
</body>
</html>
