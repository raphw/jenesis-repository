<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Console')}">
    <meta charset="utf-8">
    <title>jenesis-repository</title>
</head>
<body>
<a class="app-skip-link" href="#main">Skip to content</a>
<header class="container">
    <nav class="app-nav">
        <ul>
            <li th:insert="~{base :: brand('jenesis-repository', @{/}, 'jenesis-repository')}"></li>
        </ul>
        <ul>
            <li th:each="panel : ${panels}">
                <a th:href="'#' + ${panel.id}" th:text="${panel.title}">Panel</a>
            </li>
            <li><select th:replace="~{base :: themeSelect}"></select></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0">
                    <button type="submit" class="secondary outline">Sign out</button>
                </form>
            </li>
        </ul>
    </nav>
</header>
<main id="main" class="container">
    <header th:replace="~{base :: pageHeader('Repository console')}"></header>
    <!--/* th:if must sit on a wrapping block: on the same element, th:replace (precedence 100) runs BEFORE
         th:if (300), so the empty state would render unconditionally. */-->
    <th:block th:if="${panels.isEmpty()}">
        <div th:replace="~{base :: empty('No panels are registered.')}"></div>
    </th:block>
    <article th:each="panel : ${panels}" th:id="${panel.id}" class="app-card">
        <header><h2 th:text="${panel.title}">Panel</h2></header>
        <div th:utext="${panel.body}">panel body</div>
    </article>
</main>
</body>
</html>
