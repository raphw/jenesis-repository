<!doctype html>
<!--
  browse.html — the generic artifact browse: a breadcrumbed, lazy tree over the repository's published namespace.

  Rendered by BrowseController against the ArtifactStore listing seam. Every level lists only its immediate children;
  a folder's children are fetched on demand (the `rows` fragment, served by /browse/children and swapped in by htmx on
  expand, or reached by navigating into the folder), so the browse never scans or buffers a whole tree. It composes
  the shared design-system base (base.html fragments + app.css .app-list / .app-breadcrumb), so it is one visual
  language with the rest of the console.
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Browse')}">
    <meta charset="utf-8">
    <title>Browse · jenesis-repository</title>
</head>
<body>
<a class="app-skip-link" href="#main">Skip to content</a>
<header class="container">
    <nav class="app-nav">
        <ul>
            <li th:insert="~{base :: brand('jenesis-repository', @{/})}"></li>
        </ul>
        <ul>
            <li><a th:href="@{/console}">Console</a></li>
            <li><select th:replace="~{base :: themeSelect}"></select></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0">
                    <button type="submit" class="secondary outline">Sign out</button>
                </form>
            </li>
        </ul>
    </nav>
</header>
<main id="main" class="container">
    <header th:replace="~{base :: pageHeaderCrumbs('Browse', ${crumbs})}"></header>

    <table class="app-list">
        <thead>
        <tr>
            <th scope="col">Name</th>
            <th scope="col">Type</th>
            <th scope="col" class="app-list__num">Size</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${hasParent}">
            <td class="app-list__name">
                <a th:href="@{/browse(path=${parent})}" aria-label="Up one level">⌂ ..</a>
            </td>
            <td>up</td>
            <td class="app-list__num">—</td>
        </tr>
        <th:block th:fragment="rows">
            <tr th:each="e : ${entries}">
                <td class="app-list__name" th:style="'padding-left:calc(var(--app-space-4) * ' + ${e.depth} + ')'">
                    <button th:if="${e.folder}" type="button" class="app-tree-toggle"
                            th:attr="hx-get=@{/browse/children(path=${e.path})}"
                            hx-target="closest tr" hx-swap="afterend" hx-trigger="click once"
                            aria-label="Expand folder">▸</button>
                    <a th:if="${e.folder}" th:href="@{/browse(path=${e.path})}"
                       th:text="${e.name} + '/'">folder/</a>
                    <span th:unless="${e.folder}" th:text="${e.name}">artifact</span>
                </td>
                <td th:text="${e.folder} ? 'folder' : 'artifact'">type</td>
                <td class="app-list__num" th:text="${e.size}">—</td>
            </tr>
        </th:block>
        </tbody>
    </table>

    <!--/* th:if must sit on a wrapping block: on the same element, th:replace (precedence 100) runs BEFORE
         th:if (300), so both empty states would render unconditionally. */-->
    <th:block th:if="${entries.isEmpty() and !hasParent}">
        <div th:replace="~{base :: empty('The repository is empty. Publish an artifact to see it here.')}"></div>
    </th:block>
    <th:block th:if="${entries.isEmpty() and hasParent}">
        <div th:replace="~{base :: empty('This folder is empty.')}"></div>
    </th:block>
</main>
</body>
</html>
