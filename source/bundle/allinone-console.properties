# Configuration for the console node run off the all-in-one image (build.jenesis.repository.bundle.Console).
# Loaded as allinone-console.properties (the launcher sets spring.config.name=allinone-console) for the same
# reason AllInOne reads allinone.properties: two root application.properties on one module path are ambiguous.
# The settings mirror the console's application.properties; the same JENESIS_* environment variables apply.
spring.application.name=jenesis-repository-console
server.port=${PORT:8081}

# An HTTPS-terminating ingress fronts the app over forwarded headers, so honour them when building OAuth
# redirect URIs and absolute links.
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# Session cookie hardening. Set JENESIS_UI_SECURE_COOKIE=true behind HTTPS so the session cookie survives the
# OAuth redirect; it defaults to false for plain-HTTP local runs.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${JENESIS_UI_SECURE_COOKIE:false}
server.servlet.session.cookie.same-site=lax

# The artifact store the console reads, selected the same way the repository server selects it (the same
# JENESIS_STORE backend and JENESIS_STORE_ROOT / cloud settings point both at one store).
jenesis.ui.store=${JENESIS_STORE:filesystem}
jenesis.ui.admins=${JENESIS_UI_ADMINS:}

# GitHub OAuth app credentials. When the client id is blank, GitHub login is disabled.
jenesis.ui.github.client-id=${JENESIS_UI_GITHUB_CLIENT_ID:}
jenesis.ui.github.client-secret=${JENESIS_UI_GITHUB_CLIENT_SECRET:}

# A generic OpenID Connect provider (Google, Keycloak, Okta, Azure AD, Auth0, ...). Endpoints and the JWK set
# are discovered from the issuer URI at startup. When the issuer or client id is blank, OIDC login is disabled.
# JENESIS_UI_OIDC_NAME labels the sign-in button. If neither GitHub nor OIDC is configured, sign-in is disabled
# and the app shows a "not configured" notice instead of failing (run the dev profile for local form login).
jenesis.ui.oidc.issuer-uri=${JENESIS_UI_OIDC_ISSUER_URI:}
jenesis.ui.oidc.client-id=${JENESIS_UI_OIDC_CLIENT_ID:}
jenesis.ui.oidc.client-secret=${JENESIS_UI_OIDC_CLIENT_SECRET:}
jenesis.ui.oidc.name=${JENESIS_UI_OIDC_NAME:Single sign-on}

# Templates and static assets live under META-INF (templates/, resources/) rather than the classpath root:
# META-INF is not a legal Java package name, so the module system derives no package from them and a
# downstream console module (the enterprise UI) can `requires` this one and th:replace the base.html
# fragments without a split-package clash. Static URLs are unchanged - Spring Boot serves
# classpath:/META-INF/resources/ first by default; only the template prefix needs naming.
spring.thymeleaf.prefix=classpath:/META-INF/templates/
