# Configuration for the all-in-one server (build.jenesis.repository.bundle.AllInOne). Loaded as
# allinone.properties (the launcher sets spring.config.name=allinone) because the server and the console are both
# on this bundle's module path and each carries a root application.properties - naming the file removes the
# ambiguity, exactly like the enterprise combined node's combined.properties. The settings mirror the server's
# application.properties; the same JENESIS_* environment variables configure the image.
spring.application.name=jenesis-repository
server.port=${PORT:8080}

# The repository streams opaque artifact bodies of any size (jars, wheels, nupkgs, tarballs); do not let
# Spring parse or drain a request body as a web form before the format handler reads it. A multipart
# upload (twine to the PyPI format) and a form-encoded PUT would otherwise be consumed by the multipart
# resolver or FormContentFilter and reach the handler empty.
spring.servlet.multipart.enabled=false
spring.mvc.formcontent.filter.enabled=false
server.tomcat.max-swallow-size=-1

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
jenesis.repository.store=${JENESIS_STORE:filesystem}
jenesis.repository.auth=${JENESIS_REPOSITORY_AUTH:false}
