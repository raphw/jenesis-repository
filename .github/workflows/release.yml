name: Release jenesis-repository

# Releases ride the '[release]' commit-marker convention: a push to main whose head
# commit message starts with '[release]' (next minor of the latest tag) or
# '[release <version>]' (explicit) triggers this workflow once the test workflow
# has completed successfully for that commit. Staging re-runs the build with strict
# dependency pinning and the Maven Central POM metadata from project.properties;
# JReleaser then signs, deploys every staged module to Maven Central and cuts the
# GitHub release + tag. The Maven staging repository under target/stage/maven/output
# carries all modules, each with sources and javadoc as Central requires.

on:
  workflow_run:
    workflows: [Test jenesis-repository]
    types: [completed]
    branches: [main]

# Route Maven Central through the repository variable MAVEN_REPOSITORY_URI when set
# (a mirror, to avoid Central rate-limiting the runners), falling back to Central
# itself so an unset variable never becomes an empty URI.
env:
  MAVEN_REPOSITORY_URI: ${{ vars.MAVEN_REPOSITORY_URI || 'https://repo1.maven.org/maven2/' }}

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (startsWith(github.event.workflow_run.head_commit.message, '[release]') ||
       startsWith(github.event.workflow_run.head_commit.message, '[release '))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release version
        id: version
        env:
          MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          HEADER="$(printf '%s\n' "$MESSAGE" | head -n1)"
          VERSION="$(echo "$HEADER" | sed -nE 's/^\[release[[:space:]]+v?([0-9]+\.[0-9]+\.[0-9]+)\].*$/\1/p')"
          if [ -z "$VERSION" ]; then
            STRAY="$(echo "$HEADER" | sed -nE 's/^\[release\][[:space:]]+v?([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')"
            if [ -n "$STRAY" ]; then
              echo "Version '$STRAY' must be inside the marker: use '[release $STRAY]', not '[release] $STRAY'." >&2
              exit 1
            fi
            LATEST="$(git tag --list --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | sed 's/^v//')"
            if [ -z "$LATEST" ]; then
              VERSION="0.0.1"
            else
              MAJOR="$(echo "$LATEST" | cut -d. -f1)"
              MINOR="$(echo "$LATEST" | cut -d. -f2)"
              VERSION="${MAJOR}.$((MINOR + 1)).0"
            fi
          fi
          echo "Resolved release version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and stage artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          java -Djenesis.project.version=${VERSION} \
               -Djenesis.project.sources=true \
               -Djenesis.project.documentation=true \
               -Djenesis.dependency.pin=strict \
               -Djenesis.project.metadata=project.properties \
               build/jenesis/Project.java stage

      - name: JReleaser deploy
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # 2.5.0
        with:
          version: latest
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jreleaser-logs
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
