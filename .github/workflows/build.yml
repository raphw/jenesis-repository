name: Test jenesis-repository

on:
  push:
    branches: [main]
  pull_request:

# Route Maven Central through the repository variable MAVEN_REPOSITORY_URI when set
# (a mirror, to avoid Central rate-limiting the runners), falling back to Central
# itself so an unset variable never becomes an empty URI.
env:
  MAVEN_REPOSITORY_URI: ${{ vars.MAVEN_REPOSITORY_URI || 'https://repo1.maven.org/maven2/' }}

# A single build runs the whole project in one `java build/jenesis/Project.java`
# invocation, so the expensive tool integration tests are gated with JUnit tags
# rather than split into separate (re-compiling) jobs. Each such test carries a
# @Tag ("docker", "helm", "proxy", "maven", "nexus", "s3", "azure"); on a pull request the step below diffs
# the changed paths and, for every area left untouched, adds that tag to a single
# --include-tag negation expression (jenesis.test.tag), so the run skips exactly
# those suites while still executing every other test. A push to main always runs
# the full suite. The "docker" tag also covers the OCI pull-through proxy against Docker
# Hub, "proxy" covers the Maven pull-through proxy against Maven Central, "maven" is the
# Maven deploy/resolve round-trip driven by the real mvn client, and "nexus" migrates from a real
# Sonatype Nexus (pulled via the docker CLI, seeded with mvn). Tools are installed only when
# their suite is selected: docker and mvn are preinstalled on the runner; helm is fetched on
# demand; MinIO/Azurite and Nexus are started by their tests through the docker CLI. The mvn and
# nexus suites route their plugin resolution through MAVEN_REPOSITORY_URI, so they hit the same mirror.
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Decide which tagged suites to run
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "event=$GITHUB_EVENT_NAME -> running the full suite"
            echo "NEED_HELM=true" >> "$GITHUB_ENV"
            exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"
          printf '%s\n' "Changed files:" "$CHANGED"
          match() { printf '%s\n' "$CHANGED" | grep -qE "$1"; }
          if match '^(build/|\.github/|source/format/spi/|source/store/spi/|source/store/filesystem/|source/server/|test/server/module-info\.java)'; then
            echo "core change -> running the full suite"
            echo "NEED_HELM=true" >> "$GITHUB_ENV"
            exit 0
          fi
          inc_oci=false
          if match '^source/format/oci/' || match '/(OciDockerTest|HelmOciTest|OciFormatTest|OciProxyTest)\.java'; then inc_oci=true; fi
          inc_proxy=false
          if match '^source/format/maven/' || match '/MavenProxyTest\.java'; then inc_proxy=true; fi
          inc_maven=false
          if match '^source/format/maven/' || match '/MavenClientTest\.java'; then inc_maven=true; fi
          inc_nexus=false
          if match '^source/importer/nexus/' || match '/NexusImportTest\.java'; then inc_nexus=true; fi
          inc_s3=false
          if match '^source/store/s3/' || match '^test/store/s3/'; then inc_s3=true; fi
          inc_azure=false
          if match '^source/store/azure/' || match '^test/store/azure/'; then inc_azure=true; fi
          exclude=()
          $inc_oci   || exclude+=(docker helm)
          $inc_proxy || exclude+=(proxy)
          $inc_maven || exclude+=(maven)
          $inc_nexus || exclude+=(nexus)
          $inc_s3    || exclude+=(s3)
          $inc_azure || exclude+=(azure)
          if [ ${#exclude[@]} -gt 0 ]; then
            joined="$(IFS='|'; printf '%s' "${exclude[*]}")"
            echo "TAG=!(${joined})" >> "$GITHUB_ENV"
            echo "Excluding tags: ${joined}"
          fi
          $inc_oci && echo "NEED_HELM=true" >> "$GITHUB_ENV"
          true

      - name: Log in to Docker Hub (optional, avoids anonymous pull rate limits)
        if: env.DOCKERHUB_USERNAME != ''
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Install Helm
        if: env.NEED_HELM == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.local/helm"
          curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz | tar -xz -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/linux-amd64/helm" "$HOME/.local/helm/helm"
          chmod +x "$HOME/.local/helm/helm"
          "$HOME/.local/helm/helm" version

      - name: Build and test
        shell: bash
        run: |
          if [ -n "${TAG:-}" ]; then
            echo "Running with jenesis.test.tag=$TAG"
            java -Djenesis.test.tag="$TAG" build/jenesis/Project.java
          else
            java build/jenesis/Project.java
          fi

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target
          path: target/
          retention-days: 3
          if-no-files-found: ignore
